<!doctype html>
<html
  lang="ja"
  data-fund-code="253266"
  data-fallback-path="../mock/latest.json"
  data-official-source-url="https://emaxis.am.mufg.jp/fund/253266.html"
>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>eMAXIS Slim 米国株式（S&amp;P500） | ファンド価格予測くん</title>
    <meta
      name="description"
      content="eMAXIS Slim 米国株式（S&P500）の公式基準価額と推定値を表示するページ。"
    >
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Fund Price Forecast</p>
        <h1>ファンド価格予測くん</h1>
        <p class="hero-copy">
          基準価額の公式値と、S&amp;P 500 と TTM から計算した推定値を確認できます。
        </p>
        <p class="hero-copy hero-nav"><a href="../">対応ファンド一覧へ戻る</a></p>
      </header>

      <main id="app" class="layout" aria-live="polite">
        <section class="panel loading-panel">
          <p>データを読み込み中です。</p>
        </section>
      </main>

      <template id="app-template">
        <section class="panel primary">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Selected Fund</p>
              <h2 data-field="fund-name"></h2>
            </div>
            <span class="pill" data-field="prediction-status"></span>
          </div>
          <p class="muted" data-field="fund-meta"></p>
          <p class="muted" data-field="timezone-meta"></p>
          <div class="metric-grid">
            <article class="metric-card">
              <p class="metric-label">最新の公式基準価額</p>
              <p class="metric-value" data-field="official-nav"></p>
              <p class="metric-sub" data-field="official-date"></p>
              <p class="metric-sub">
                <a data-field="official-source-link" target="_blank" rel="noopener noreferrer">公式ソースを見る</a>
              </p>
            </article>
            <article class="metric-card accent">
              <p class="metric-label">最新の推定値</p>
              <p class="metric-value" data-field="predicted-nav"></p>
              <p class="metric-sub" data-field="prediction-note"></p>
            </article>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Model Inputs</p>
              <h2>上流データ</h2>
            </div>
          </div>
          <div class="source-grid">
            <article class="source-card">
              <p class="source-title">S&amp;P 500</p>
              <p class="source-value" data-field="sp500-value"></p>
              <p class="source-meta" data-field="sp500-meta"></p>
            </article>
            <article class="source-card">
              <p class="source-title">為替 (USD/JPY TTM)</p>
              <p class="source-value" data-field="ttm-value"></p>
              <p class="source-meta" data-field="ttm-meta"></p>
            </article>
            <article class="source-card">
              <p class="source-title">年率信託報酬</p>
              <p class="source-value" data-field="fee-value"></p>
              <p class="source-meta">このファンドの年率信託報酬。長期予測では日割り換算して補正</p>
            </article>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">History</p>
              <h2>直近の履歴</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日付</th>
                  <th>種別</th>
                  <th>値</th>
                  <th>備考</th>
                </tr>
              </thead>
              <tbody data-field="history-body"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Caveats</p>
              <h2>モデル前提</h2>
            </div>
          </div>
          <ul class="caveats" data-field="assumptions"></ul>
        </section>
      </template>
    </div>

    <script src="../local-config.js?v=20260423a"></script>
    <script src="../app.js?v=20260423a" type="module"></script>
  </body>
</html>
